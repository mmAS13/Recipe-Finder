<body>
    <div class="container">
        <!-- Header -->
        <header class="header" role="banner">
            <h1><i class="fas fa-utensils" aria-hidden="true"></i> Recipe Finder</h1>
            <p>Discover mouthwatering recipes from around the world with stunning visuals ✨</p>
        </header>

        <!-- Search Section -->
        <section class="search-section" role="search">
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput"
                    placeholder="🔍 Search recipes... Try 'Butter Chicken', 'Pizza Margherita', 'Sushi', 'Pasta'..."
                    autocomplete="off"
                    aria-label="Search for recipes"
                >
                <button class="search-btn" id="searchBtn" aria-label="Search recipes">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </section>

        <!-- Recipes Container -->
        <main id="recipesContainer" role="main" aria-live="polite"></main>
    </div>

    <!-- Recipe Modal -->
    <div class="modal" id="recipeModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <button class="modal-close" id="modalClose" aria-label="Close recipe modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <img id="modalImage" class="modal-image" src="" alt="" loading="lazy">
                <div class="ingredients-section">
                    <h3 class="section-title">
                        <i class="fas fa-list-ul" aria-hidden="true"></i> Ingredients
                    </h3>
                    <div class="ingredients-list" id="modalIngredients" role="list"></div>
                </div>
                <div class="instructions-section">
                    <h3 class="section-title">
                        <i class="fas fa-concierge-bell" aria-hidden="true"></i> Instructions
                    </h3>
                    <div class="instructions" id="modalInstructions" role="document"></div>
                </div>
            </div>
        </div>
    </div>

     <!-- Custom JS -->
     <script src="script.js"></script>
</body>
</html>
